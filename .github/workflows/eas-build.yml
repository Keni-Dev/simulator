name: EAS Build

on:
  # Manual trigger with platform selection
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

  # Automatic production builds on main branch
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  build:
    name: EAS Build (${{ inputs.platform || 'all' }} - ${{ inputs.profile || 'preview' }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Run pre-build checks
        run: |
          npm run lint
          npm run typecheck || true  # Allow type errors for now

      - name: Build iOS
        if: ${{ inputs.platform == 'ios' || inputs.platform == 'all' || github.event_name == 'push' }}
        run: eas build --platform ios --profile ${{ inputs.profile || 'preview' }} --non-interactive

      - name: Build Android
        if: ${{ inputs.platform == 'android' || inputs.platform == 'all' || github.event_name == 'push' }}
        run: eas build --platform android --profile ${{ inputs.profile || 'preview' }} --non-interactive

  # Submit to stores (only for production builds on main)
  submit:
    name: Submit to Stores
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Submit iOS to TestFlight
        run: eas submit --platform ios --latest --non-interactive
        continue-on-error: true # Don't fail if submission fails

      - name: Submit Android to Play Store
        run: eas submit --platform android --latest --non-interactive
        continue-on-error: true # Don't fail if submission fails
